server:
  port: 8080
---
dataservice:
  url: http://127.0.0.1:8000
  endpoint:
    status: ${dataservice.url}/data/status
    event: ${dataservice.url}/data/event
    fixed: ${dataservice.url}/data/fixed
---
bucket:
  projectId: ssb-team-microdata-staging
  bucketName: data-service-bucket-microdata-poc
  files:
    metadata-all:
      downloadFile: metadata-all-test__1_0_0.json
      destFile: metadata-all.json
    data-store:
      downloadFile: data-store.json
      destFile: data-store.json
    versions:
      downloadFile: versions.json
      destFile: versions.json
---
info:
  version: '@APPLICATION_VERSION@'
---
logging:
  level:
    'no':
      microdata:
        datastore: INFO
    org:
      apache:
        http:
          headers: INFO
          wire: INFO
---
management:
  endpoints:
    web:
      exposure:
        include: '*'
  server:
    port: 8081
---
spring:
  application:
    name: '@APPLICATION_NAME@'
  boot:
    admin:
      url: ''
  http:
    encoding:
      force: false
  main:
    banner-mode: 'off'
